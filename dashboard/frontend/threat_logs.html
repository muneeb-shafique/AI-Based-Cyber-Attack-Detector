<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREAT VISION - Threat Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020204;
            --panel-bg: rgba(10, 15, 25, 0.7);
            --border-color: rgba(0, 240, 255, 0.2);
            --cyan: #00f0ff;
            --magenta: #ff003c;
            --green: #00ff66;
            --purple: #8a2be2;
            --text-main: #e0e6ed;
            --text-dim: #708090;
            --glow-cyan: 0 0 15px rgba(0, 240, 255, 0.4);
            --glow-red: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom scrollbar for table */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: grid;
            grid-template-columns: 80px 1fr;
            grid-template-rows: 80px 1fr;
            background-image: radial-gradient(circle at 50% 0%, rgba(255,0,60,0.05) 0%, transparent 50%);
        }

        /* --- Sidebar Navigation --- */
        nav {
            grid-row: 1 / -1;
            background: rgba(2, 2, 4, 0.9);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 30px;
            z-index: 10;
        }

        .nav-item {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            text-decoration: none;
        }

        .nav-item::before {
            content: ''; position: absolute; left: -15px; width: 4px; height: 0;
            background: var(--cyan); transition: height 0.3s; border-radius: 2px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--cyan); background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }
        
        .nav-item.active::before { height: 100%; }

        /* --- Header --- */
        header {
            grid-column: 2 / -1;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 1px solid var(--border-color);
            background: linear-gradient(90deg, rgba(2,2,4,0.9) 0%, transparent 100%);
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem; font-weight: 800; letter-spacing: 4px;
            text-transform: uppercase; display: flex; align-items: center; gap: 15px;
        }

        .logo span { color: var(--magenta); text-shadow: var(--glow-red); }
        .system-status { display: flex; gap: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-dim); }
        .system-status span { color: var(--text-main); }

        /* --- Main Content: Threat Logs Table --- */
        main {
            grid-column: 2; grid-row: 2;
            padding: 40px;
            display: flex; flex-direction: column; gap: 20px;
            overflow: hidden;
        }

        .table-controls {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 15, 25, 0.5); border: 1px solid var(--border-color);
            padding: 15px 20px; border-radius: 8px;
        }

        .search-box {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--text-main); padding: 10px 15px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            width: 300px; outline: none; transition: all 0.3s;
        }
        .search-box:focus { border-color: var(--cyan); box-shadow: var(--glow-cyan); }

        .btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-color);
            color: var(--cyan); padding: 8px 20px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: rgba(0, 240, 255, 0.1); box-shadow: var(--glow-cyan); }

        .table-container {
            flex-grow: 1; overflow-y: auto; overflow-x: auto;
            background: var(--panel-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); border-radius: 8px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%; border-collapse: collapse; text-align: left;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }

        th, td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th {
            background: rgba(0,0,0,0.5); color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
            position: sticky; top: 0; z-index: 1;
        }

        tr { transition: background 0.2s; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .critical { color: var(--magenta); text-shadow: var(--glow-red); }
        .high { color: #ff8c00; }
        .medium { color: #ffd700; }
        .low { color: var(--cyan); }

    </style>
</head>
<body>

    <nav>
        <a href="dashboard.html" class="nav-item" title="Dashboard">⌬</a>
        <a href="neural_core.html" class="nav-item" title="Neural Core">⚯</a>
        <a href="network_map.html" class="nav-item" title="Network Map">📡</a>
        <a href="threat_logs.html" class="nav-item active" title="Threat Logs">🛡️</a>
        <a href="settings.html" class="nav-item" style="margin-top: auto;" title="Settings">⚙️</a>
    </nav>

    <header>
        <div class="logo">THREAT <span>VISION</span></div>
        <div class="system-status">
            <div>DATABASE: <span style="color: var(--cyan);">CONNECTED</span></div>
            <div>RECORD COUNT: <span id="record-count">0</span></div>
        </div>
    </header>

    <main>
        <div class="table-controls">
            <input type="text" class="search-box" placeholder="Search IP or Attack Type..." id="search-input">
            <button class="btn" onclick="fetchLogs()">REFRESH LOGS</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Severity</th>
                        <th>Attack Type</th>
                        <th>Source IP</th>
                        <th>Destination IP</th>
                        <th>Confidence</th>
                        <th>Recommended Action</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <!-- Data will be populated here via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const tbody = document.getElementById('logs-body');
        const searchInput = document.getElementById('search-input');
        let allAlerts = [];

        function formatTime(isoString) {
            const d = new Date(isoString);
            return d.toISOString().replace('T', ' ').substring(0, 19);
        }

        function getSeverityClass(severity) {
            if(severity === 'CRITICAL') return 'critical';
            if(severity === 'HIGH') return 'high';
            if(severity === 'MEDIUM') return 'medium';
            return 'low';
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/v1/alerts');
                const data = await res.json();
                allAlerts = data.alerts || [];
                document.getElementById('record-count').innerText = allAlerts.length;
                renderTable(allAlerts);
            } catch (e) {
                console.error("Error fetching logs:", e);
            }
        }

        function renderTable(alerts) {
            tbody.innerHTML = '';
            if (alerts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-dim);">NO THREATS RECORDED</td></tr>';
                return;
            }

            alerts.forEach(alert => {
                const tr = document.createElement('tr');
                tr.innerHTML = \`
                    <td style="color: var(--text-dim);">\${formatTime(alert.timestamp)}</td>
                    <td class="\${getSeverityClass(alert.severity)}">\${alert.severity}</td>
                    <td style="color: var(--text-main); font-weight: bold;">\${alert.attack_type}</td>
                    <td>\${alert.source_ip}</td>
                    <td>\${alert.dest_ip}</td>
                    <td style="color: var(--cyan);">\${(alert.confidence * 100).toFixed(1)}%</td>
                    <td style="color: var(--text-dim);">\${alert.recommended}</td>
                \`;
                tbody.appendChild(tr);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allAlerts.filter(a => 
                a.attack_type.toLowerCase().includes(term) ||
                a.source_ip.toLowerCase().includes(term) ||
                a.dest_ip.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        fetchLogs();
        // Optional: auto-refresh every 10 seconds
        setInterval(fetchLogs, 10000);
    </script>
</body>
</html>
