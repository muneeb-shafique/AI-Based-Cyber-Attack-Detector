<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREAT VISION - Network Topology</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020204;
            --panel-bg: rgba(10, 15, 25, 0.7);
            --border-color: rgba(0, 240, 255, 0.2);
            --cyan: #00f0ff;
            --magenta: #ff003c;
            --green: #00ff66;
            --purple: #8a2be2;
            --text-main: #e0e6ed;
            --text-dim: #708090;
            --glow-cyan: 0 0 15px rgba(0, 240, 255, 0.4);
            --glow-red: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            scrollbar-width: none;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: grid;
            grid-template-columns: 80px 1fr 300px;
            grid-template-rows: 80px 1fr;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* --- Sidebar Navigation --- */
        nav {
            grid-row: 1 / -1;
            background: rgba(2, 2, 4, 0.9);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 30px;
            z-index: 10;
        }

        .nav-item {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            text-decoration: none;
        }

        .nav-item::before {
            content: ''; position: absolute; left: -15px; width: 4px; height: 0;
            background: var(--cyan); transition: height 0.3s; border-radius: 2px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--cyan); background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }
        
        .nav-item.active::before { height: 100%; }

        /* --- Header --- */
        header {
            grid-column: 2 / -1;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 1px solid var(--border-color);
            background: linear-gradient(90deg, rgba(2,2,4,0.9) 0%, transparent 100%);
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem; font-weight: 800; letter-spacing: 4px;
            text-transform: uppercase; display: flex; align-items: center; gap: 15px;
        }

        .logo span { color: var(--cyan); text-shadow: var(--glow-cyan); }
        .system-status { display: flex; gap: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-dim); }
        .system-status span { color: var(--green); }

        /* --- Canvas Background --- */
        #network-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- Right Panel: Node Details --- */
        .node-panel {
            grid-column: 3; grid-row: 2;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--border-color);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
        }

        .panel-title {
            font-size: 0.85rem; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--cyan);
            border-bottom: 1px dashed var(--border-color); padding-bottom: 10px;
        }

        .node-stat {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px; padding: 15px;
        }

        .node-stat span { display: block; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--text-main); }
        .stat-value.threat { color: var(--magenta); text-shadow: var(--glow-red); }

        /* Overlay text on canvas */
        .overlay-title {
            position: absolute; top: 100px; left: 120px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            color: var(--cyan); text-transform: uppercase;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <canvas id="network-canvas"></canvas>
    <div class="overlay-title">SECTOR 7G TOPOLOGY MAP <span id="radar-scan">... SCANNING</span></div>

    <nav>

        <a href="neural_core.html" class="nav-item" title="Neural Core"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg></a>
        <a href="network_map.html" class="nav-item active" title="Network Map"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg></a>

    </nav>

    <header>
        <div class="logo">THREAT <span>VISION</span></div>
        <div class="system-status">
            <div>NETWORK: <span style="color: var(--cyan);">ONLINE</span></div>
            <div>NODES: <span id="node-count-txt">256</span></div>
        </div>
    </header>

    <div class="node-panel">
        <div class="panel-title">Node Telemetry</div>
        <div id="node-details">
            <div style="color: var(--text-dim); font-size: 0.8rem; font-style: italic;">
                Hover over a node on the map to inspect telemetry...
            </div>
        </div>
    </div>

    <script>
        // --- 1. Canvas Network Topology ---
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let nodes = [];
        let mouse = { x: null, y: null };
        let hoveredNode = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class NetNode {
            constructor(ip, isThreat) {
                this.x = (Math.random() * (width - 400)) + 100;
                this.y = (Math.random() * (height - 200)) + 100;
                this.ip = ip;
                this.isThreat = isThreat;
                this.radius = this.isThreat ? 8 : 4;
                this.connections = [];
                this.baseX = this.x;
                this.baseY = this.y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.01 + 0.005;
                this.traffic = Math.floor(Math.random() * 5000);
            }
            update() {
                this.x = this.baseX + Math.cos(this.angle) * 20;
                this.y = this.baseY + Math.sin(this.angle) * 20;
                this.angle += this.speed;
            }
            draw() {
                const dist = Math.hypot(this.x - mouse.x, this.y - mouse.y);
                const isHovered = dist < 20;
                if (isHovered) hoveredNode = this;

                ctx.beginPath();
                ctx.arc(this.x, this.y, isHovered ? this.radius * 2 : this.radius, 0, Math.PI * 2);
                
                if (this.isThreat) {
                    ctx.fillStyle = 'rgba(255, 0, 60, 1)';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(255, 0, 60, 0.8)';
                } else {
                    ctx.fillStyle = isHovered ? 'rgba(255, 255, 255, 1)' : 'rgba(0, 240, 255, 0.8)';
                    ctx.shadowBlur = isHovered ? 20 : 5;
                    ctx.shadowColor = 'rgba(0, 240, 255, 0.6)';
                }
                
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if (isHovered || this.isThreat) {
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.font = "11px JetBrains Mono";
                    ctx.fillText(this.ip, this.x + 12, this.y - 12);
                }
            }
        }

        let edgeList = [];

        async function fetchGraphData() {
            try {
                const res = await fetch('/api/v1/network/graph');
                const data = await res.json();
                
                document.getElementById('node-count-txt').innerText = data.nodes.length || 0;

                // Simple state merge to avoid redrawing jumping nodes
                const newNodes = [];
                data.nodes.forEach(n => {
                    let existing = nodes.find(old => old.ip === n.id);
                    let isThreat = data.edges.some(e => (e.source === n.id || e.target === n.id) && (e.severity === 'CRITICAL' || e.severity === 'HIGH'));
                    
                    if (existing) {
                        existing.isThreat = isThreat;
                        existing.radius = isThreat ? 8 : 4;
                        existing.connections = []; // Reset for new edges
                        newNodes.push(existing);
                    } else {
                        newNodes.push(new NetNode(n.id, isThreat));
                    }
                });
                
                nodes = newNodes;
                edgeList = data.edges;

                // Rebuild connections
                data.edges.forEach(e => {
                    const src = nodes.find(n => n.ip === e.source);
                    const dst = nodes.find(n => n.ip === e.target);
                    if (src && dst && !src.connections.includes(dst)) {
                        src.connections.push(dst);
                    }
                });

            } catch(e) {
                console.error("Failed to fetch graph data", e);
            }
        }

        // Fetch immediately and poll
        fetchGraphData();
        setInterval(fetchGraphData, 5000);

        function drawConnections() {
            ctx.lineWidth = 0.5;
            for(let i=0; i<nodes.length; i++) {
                const node = nodes[i];
                for(let j=0; j<node.connections.length; j++) {
                    const target = node.connections[j];
                    ctx.beginPath();
                    
                    if (node.isThreat || target.isThreat) {
                        ctx.strokeStyle = 'rgba(255, 0, 60, 0.2)';
                    } else {
                        ctx.strokeStyle = 'rgba(0, 240, 255, 0.15)';
                    }
                    
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(target.x, target.y);
                    ctx.stroke();

                    // Animate packets along the line
                    const t = (Date.now() % 2000) / 2000;
                    const px = node.x + (target.x - node.x) * t;
                    const py = node.y + (target.y - node.y) * t;
                    ctx.beginPath();
                    ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fillStyle = (node.isThreat || target.isThreat) ? 'rgba(255, 0, 60, 0.8)' : 'rgba(0, 240, 255, 0.8)';
                    ctx.fill();
                }
            }
        }

        // Update Panel
        const panel = document.getElementById('node-details');
        function updatePanel() {
            if (hoveredNode) {
                panel.innerHTML = `
                    <div class="node-stat">
                        <span class="stat-label">IP Address</span>
                        <span class="stat-value">${hoveredNode.ip}</span>
                    </div>
                    <div class="node-stat">
                        <span class="stat-label">Status</span>
                        <span class="stat-value ${hoveredNode.isThreat ? 'threat' : ''}">${hoveredNode.isThreat ? 'COMPROMISED' : 'SECURE'}</span>
                    </div>
                    <div class="node-stat">
                        <span class="stat-label">Active Connections</span>
                        <span class="stat-value">${hoveredNode.connections.length}</span>
                    </div>
                    <div class="node-stat">
                        <span class="stat-label">Data Transferred</span>
                        <span class="stat-value">${hoveredNode.traffic} MB</span>
                    </div>
                `;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw radar sweep
            const t = Date.now() / 1000;
            const cx = width/2;
            const cy = height/2;
            const radius = Math.max(width, height);
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(t);
            const grad = ctx.createLinearGradient(0, 0, radius, 0);
            grad.addColorStop(0, 'rgba(0, 240, 255, 0.1)');
            grad.addColorStop(1, 'rgba(0, 240, 255, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.arc(0, 0, radius, 0, 0.2);
            ctx.fill();
            ctx.restore();

            hoveredNode = null;
            
            drawConnections();
            
            for(let i=0; i<nodes.length; i++) {
                nodes[i].update();
                nodes[i].draw();
            }

            updatePanel();
            
            requestAnimationFrame(animate);
        }

        animate();

        // Flashing text
        setInterval(() => {
            const el = document.getElementById('radar-scan');
            el.style.opacity = el.style.opacity === '0' ? '1' : '0';
        }, 500);
    </script>

</body>
