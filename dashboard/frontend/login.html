<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREAT VISION - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030508;
            --panel-bg: rgba(10, 15, 25, 0.6);
            --border-color: rgba(138, 43, 226, 0.3);
            --cyan: #00f0ff;
            --magenta: #ff003c;
            --green: #00ff66;
            --purple: #8a2be2;
            --text-main: #e0e6ed;
            --text-dim: #708090;
            --glow-purple: 0 0 25px rgba(138, 43, 226, 0.6);
            --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* Animated Background Canvas */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .auth-container {
            position: relative; z-index: 10;
            width: 420px; padding: 40px;
            background: rgba(5, 8, 15, 0.7);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color); border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(138, 43, 226, 0.1);
            animation: formEntrance 1s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        @keyframes formEntrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            text-align: center; font-size: 1.8rem; font-weight: 800; letter-spacing: 5px;
            margin-bottom: 30px; text-transform: uppercase;
        }
        .logo span { color: var(--purple); text-shadow: var(--glow-purple); }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label {
            display: block; font-size: 0.75rem; color: var(--cyan);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px;
            font-family: 'JetBrains Mono', monospace;
        }
        .input-group input {
            width: 100%; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            padding: 12px 15px; color: var(--text-main); font-size: 1rem;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .input-group input:focus {
            outline: none; border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0,240,255,0.2), inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-submit {
            width: 100%; padding: 14px; background: transparent;
            border: 1px solid var(--purple); border-radius: 8px;
            color: var(--text-main); font-size: 0.9rem; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.4s; z-index: 1;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-submit::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%; background: var(--purple);
            transition: all 0.4s; z-index: -1;
        }
        .btn-submit:hover::before { left: 0; }
        .btn-submit:hover { box-shadow: var(--glow-purple); transform: translateY(-2px); }

        .form-footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-dim); }
        .form-footer a { color: var(--cyan); text-decoration: none; transition: color 0.3s; }
        .form-footer a:hover { color: var(--text-main); text-shadow: var(--glow-cyan); }

        /* Scanning Line Effect */
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            box-shadow: var(--glow-cyan); opacity: 0.5;
            animation: scan 3s infinite linear; pointer-events: none; z-index: 20;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        #error-msg {
            color: var(--magenta); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
            text-align: center; margin-bottom: 15px; display: none; text-shadow: 0 0 5px rgba(255,0,60,0.5);
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="auth-container">
        <div class="scan-line"></div>
        <div class="logo">THREAT <span>VISION</span></div>
        <div id="error-msg">ACCESS DENIED</div>
        
        <form id="login-form">
            <div class="input-group">
                <label>Operator ID</label>
                <input type="text" id="username" required autocomplete="off" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn-submit">INITIALIZE SESSION</button>
        </form>

        <div class="form-footer">
            Unregistered operator? <a href="/register.html">Request Access</a>
        </div>
    </div>

    <script>
        // Matrix/Cyberpunk background animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 1, vy: (Math.random() - 0.5) * 1,
                    size: Math.random() * 2
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(3, 5, 8, 0.2)';
            ctx.fillRect(0, 0, w, h);
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > w) p.vx *= -1;
                if(p.y < 0 || p.y > h) p.vy *= -1;
                
                ctx.fillStyle = 'rgba(138, 43, 226, 0.5)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                for(let j=i+1; j<particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(dist < 100) {
                        ctx.strokeStyle = `rgba(0, 240, 255, ${0.2 * (1 - dist/100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                
                if(res.ok && data.token) {
                    localStorage.setItem('threat_token', data.token);
                    localStorage.setItem('threat_role', data.role);
                    localStorage.setItem('threat_user', data.username);
                    window.location.href = '/dashboard.html';
                } else {
                    const err = document.getElementById('error-msg');
                    err.innerText = data.detail || 'ACCESS DENIED';
                    err.style.display = 'block';
                    // Shake animation
                    const container = document.querySelector('.auth-container');
                    container.animate([
                        {transform: 'translateX(-10px)'},
                        {transform: 'translateX(10px)'},
                        {transform: 'translateX(-10px)'},
                        {transform: 'translateX(10px)'},
                        {transform: 'translateX(0)'}
                    ], {duration: 400, iterations: 1});
                }
            } catch(err) {
                console.error(err);
                document.getElementById('error-msg').innerText = 'SYSTEM OFFLINE';
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
